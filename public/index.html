<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RWA - Rojgar With Ankit</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--surf:#111118;--card:#1a1a24;--card2:#222230;
  --bdr:#2a2a3a;--acc:#6366f1;--acc2:#818cf8;--acc3:#4f46e5;
  --org:#f59e0b;--txt:#f8fafc;--mut:#6b7280;--ok:#10b981;--err:#ef4444;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow:hidden}
.page{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:1;}
.page.active{display:flex!important;z-index:10}
.page.base{display:flex!important;z-index:1}
.tb{background:var(--surf);border-bottom:1px solid var(--bdr);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-l{display:flex;align-items:center;gap:12px;flex:1}
.bk{width:36px;height:36px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;transition:all .2s;}
.bk:active{background:var(--acc);border-color:var(--acc)}
.tb-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ava{width:40px;height:40px;border-radius:50%;border:2px solid var(--acc);cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:85px}
.sc::-webkit-scrollbar{display:none}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdr);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
.bnt{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:transparent;color:var(--mut);font-size:10px;font-family:'DM Sans',sans-serif;transition:color .2s;font-weight:500;}
.bnt.on{color:var(--acc)}
.bnt svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
#pgLogin{z-index:50;justify-content:center;align-items:center;padding:20px;background:var(--bg)}
.lb{width:100%;max-width:400px}
.brand{text-align:center;margin-bottom:32px}
.blogo{width:80px;height:80px;margin:0 auto 16px;border-radius:24px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:#fff;box-shadow:0 20px 40px rgba(99,102,241,.3);}
.brand h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
.brand h1 span{color:var(--acc2)}
.brand p{color:var(--mut);font-size:13px;margin-top:6px}
.lcard{background:var(--surf);border:1px solid var(--bdr);border-radius:24px;padding:24px}
.tabs{display:flex;background:var(--card);border-radius:14px;padding:4px;margin-bottom:24px;gap:4px}
.tabx{flex:1;padding:10px;border:none;background:transparent;color:var(--mut);font-size:13px;border-radius:10px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:600;}
.tabx.on{background:var(--acc);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.ig{margin-bottom:16px}
.ig label{display:block;font-size:11px;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.ig input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;color:var(--txt);font-size:15px;outline:none;transition:all .2s;font-family:inherit;}
.ig input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.lbtn{width:100%;padding:16px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 6px 20px rgba(99,102,241,.35);}
.lbtn:disabled{opacity:.5;cursor:not-allowed}
.emsg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:12px 16px;color:var(--err);font-size:13px;margin-top:12px;display:none}
.emsg.on{display:block}
#tsec{display:none}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:18px;overflow:hidden;margin-bottom:14px;cursor:pointer;transition:all .2s;position:relative;}
.cc:active{border-color:var(--acc);transform:scale(.98)}
.cimg{width:100%;height:130px;object-fit:cover;display:block;background:var(--surf);aspect-ratio:16/9;decoding:async}
.cph{width:100%;height:130px;display:flex;align-items:center;justify-content:center;font-size:42px;background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(129,140,248,.05))}
.cbody{padding:14px 16px;display:flex;align-items:center;gap:12px}
.cico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cnm{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;line-height:1.3}
.cmeta{font-size:11px;color:var(--mut);margin-top:3px}
.carrow{color:var(--mut);font-size:20px;margin-left:auto;flex-shrink:0}
.fav-btn{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2;backdrop-filter:blur(4px);transition:all .2s;}
.rc{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:14px 16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .2s;}
.rc:active{border-color:var(--acc);background:var(--card2)}
.rnum{width:38px;height:38px;border-radius:12px;flex-shrink:0;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--acc2);}
.rimg{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surf);decoding:async}
.rimgph{width:46px;height:46px;border-radius:50%;flex-shrink:0;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-size:20px}
.rtxt{flex:1;min-width:0}
.rnm{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.rsub{font-size:11px;color:var(--mut);margin-top:3px}
.rpro{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;flex-shrink:0}
.vc{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:12px;margin-bottom:12px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .2s;}
.vc:active{border-color:var(--acc)}
.vth{width:92px;height:60px;border-radius:12px;object-fit:cover;flex-shrink:0;background:var(--surf);decoding:async}
.vthph{width:92px;height:60px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(129,140,248,.1));display:flex;align-items:center;justify-content:center;font-size:28px}
.vtxt{flex:1;min-width:0}
.vnm{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vdt{font-size:11px;color:var(--mut);margin-top:4px}
.custom-player{position:relative;background:#000;border-radius:18px;overflow:hidden;margin-bottom:12px;transition:all .3s ease;}
.custom-player video{width:100%;display:block;max-height:250px;background:#000;cursor:pointer;object-fit:contain;transition:transform .3s;}
.custom-player.landscape video{object-fit:cover;height:100vh}
.player-controls{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.95));padding:14px;display:flex;flex-direction:column;gap:10px;opacity:0;transition:opacity 0.3s;pointer-events:none}
.custom-player:hover .player-controls,.custom-player.controls-visible .player-controls{opacity:1;pointer-events:auto}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:var(--acc);border-radius:2px;width:0%;position:relative}
.progress-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:var(--acc);border-radius:50%;opacity:0;transition:opacity 0.2s}
.progress-bar:hover .progress-fill::after{opacity:1}
.control-buttons{display:flex;align-items:center;gap:14px}
.control-buttons button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.control-buttons button:active{background:rgba(255,255,255,0.15)}
.time-display{margin-left:auto;font-size:12px;color:#fff;font-family:monospace}
.speed-control{background:rgba(0,0,0,0.7);border:1px solid var(--bdr);border-radius:24px;padding:5px 12px;font-size:11px;color:#fff;cursor:pointer;font-weight:600}
.player-info{padding:16px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--bdr)}
.player-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;line-height:1.35;margin-bottom:6px}
.player-date{font-size:12px;color:var(--mut);margin-bottom:12px}
.player-actions{display:flex;gap:10px;flex-wrap:wrap}
.pact-btn{flex:1;min-width:80px;padding:10px 12px;border-radius:12px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .2s;}
.pact-btn:active{background:var(--acc);border-color:var(--acc);color:#fff}
.pact-btn:disabled{opacity:.35;cursor:not-allowed}
.pact-btn.primary{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent;color:#fff}
.pdf-panel{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);border-top:1px solid var(--bdr)}
.pdf-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surf);border-bottom:1px solid var(--bdr)}
.pdf-header span{font-weight:600;font-size:13px;color:var(--mut)}
.pdf-close{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--txt);font-weight:500}
.pdf-tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0}
.pdf-tab{flex:1;padding:12px;border:none;background:transparent;color:var(--mut);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif;}
.pdf-tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.pdf-frame-wrap{flex:1;overflow:hidden;background:#fff}
.pdf-frame-wrap iframe{width:100%;height:100%;border:none}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.modal-container{background:var(--surf);border-radius:28px 28px 0 0;width:100%;max-width:500px;border:1px solid var(--bdr);border-bottom:none;padding-bottom:env(safe-area-inset-bottom);}
.modal-handle{width:40px;height:4px;background:var(--bdr);border-radius:2px;margin:14px auto 0}
.modal-header{padding:18px 22px 14px}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;line-height:1.3}
.modal-date{font-size:12px;color:var(--mut);margin-top:4px}
.modal-body{padding:0 22px 22px}
.modal-sec{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 10px}
.quality-buttons{display:flex;gap:10px;flex-wrap:wrap}
.quality-btn{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:11px 20px;color:var(--txt);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.quality-btn:active{background:var(--acc);border-color:var(--acc);color:#fff}
.pdf-buttons{display:flex;gap:10px}
.pdf-btn{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:13px 12px;color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .2s;}
.pdf-btn:active{background:var(--acc);border-color:var(--acc);color:#fff}
.pdf-btn:disabled{opacity:.35;cursor:not-allowed}
.close-modal{width:100%;margin-top:12px;padding:14px;background:var(--card);border:1px solid var(--bdr);border-radius:14px;color:var(--mut);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}
.lpill{display:flex;align-items:center;gap:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:14px;padding:14px 16px;margin-bottom:14px;cursor:pointer;}
.ldot{width:10px;height:10px;background:var(--org);border-radius:50%;animation:pulse 1.4s infinite;flex-shrink:0}
.ltxt{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--org)}
.sw{display:flex;gap:10px;margin-bottom:16px}
.si{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:12px 15px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;}
.si:focus{border-color:var(--acc)}
.sb{background:var(--acc);border:none;border-radius:14px;padding:12px 18px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.sh{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin:16px 0 12px}
.empty{text-align:center;padding:60px 20px}
.empty .ei{font-size:48px;margin-bottom:16px}
.empty h3{font-family:'Syne',sans-serif;font-size:18px;margin-bottom:8px}
.empty p{color:var(--mut);font-size:13px;line-height:1.6}
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--bdr) 50%,var(--card) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:14px}
.sk-c{height:180px;margin-bottom:14px;border-radius:18px}
.sk-r{height:74px;margin-bottom:12px;border-radius:16px}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.5);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--ok)}
.toast.er{border-color:rgba(239,68,68,.4);color:var(--err)}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:inline-block}
.bi{display:flex;align-items:center;justify-content:center;gap:8px}
#lmbtn{display:block;width:90%;margin:16px auto;padding:14px;background:var(--card);border:1px solid var(--bdr);border-radius:14px;color:var(--acc2);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;}
.profile-setup{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
.profile-card{background:var(--surf);border:1px solid var(--bdr);border-radius:28px;padding:28px;width:100%;max-width:360px}
.profile-card h2{font-family:'Syne',sans-serif;font-size:22px;margin-bottom:8px}
.profile-card p{color:var(--mut);font-size:13px;margin-bottom:24px}
.profile-input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px 16px;color:var(--txt);font-size:16px;margin-bottom:20px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* Professional SVG icons are used everywhere */
</style>
</head>

<!-- PLAYER - Enhanced with unique features -->
<div class="page" id="pgPlayer">
  <div class="tb" style="background:#000;border-color:#1a1a1a">
    <div class="tb-l">
      <div class="bk" style="background:#1a1a1a;border-color:#333" onclick="closePlayer()">←</div>
      <div class="tb-title" id="ptbar">Video</div>
    </div>
  </div>
  <div class="custom-player" id="customPlayer">
    <video id="vplayer" playsinline preload="metadata"></video>
    <div class="player-controls">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="control-buttons">
        <button id="playPauseBtn"></button>
        <button id="muteBtn"></button>
        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        <div class="speed-control" id="speedControl">1x</div>
        <button id="fullscreenBtn"></button>

    <div class="player-date" id="pdate"></div>

      <button class="pact-btn" id="pdfBtn2" onclick="openPdf(2)" disabled>DPP PDF</button>

    </div>
    <div class="pdf-frame-wrap">
      <iframe id="pdfFrame" src="" allowfullscreen></iframe>
    </div>
  </div>
</div>

// Enhanced initCustomPlayer with unique features
function initCustomPlayer(){
  const video=document.getElementById('vplayer');
  const playPauseBtn=document.getElementById('playPauseBtn');
  const muteBtn=document.getElementById('muteBtn');
  const fullscreenBtn=document.getElementById('fullscreenBtn');
  const progressBar=document.getElementById('progressBar');
  const progressFill=document.getElementById('progressFill');
  const timeDisplay=document.getElementById('timeDisplay');
  const speedControl=document.getElementById('speedControl');
  const playerContainer=document.getElementById('customPlayer');

  // Set SVG icons
  playPauseBtn.innerHTML = PAUSE_SVG;
  muteBtn.innerHTML = UNMUTE_SVG;
  fullscreenBtn.innerHTML = FULLSCREEN_SVG;

  function formatTime(secs){
    const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=Math.floor(secs%60);
    return h>0?`\( {h}: \){m.toString().padStart(2,'0')}:\( {s.toString().padStart(2,'0')}`:` \){m}:${s.toString().padStart(2,'0')}`;
  }

  function updateProgress(){
    if(video.duration){
      const percent=(video.currentTime/video.duration)*100;
      progressFill.style.width=`${percent}%`;
      timeDisplay.textContent=`${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    }
  }

  video.addEventListener('timeupdate',updateProgress);
  video.addEventListener('loadedmetadata',updateProgress);

  // Play/Pause
  playPauseBtn.addEventListener('click',()=>{
    if(video.paused){video.play();playPauseBtn.innerHTML=PAUSE_SVG;}
    else{video.pause();playPauseBtn.innerHTML=PLAY_SVG;}
  });

  // Mute
  muteBtn.addEventListener('click',()=>{
    video.muted = !video.muted;
    muteBtn.innerHTML = video.muted ? MUTE_SVG : UNMUTE_SVG;
  });

  // Fullscreen
  fullscreenBtn.addEventListener('click',()=>{
    if(!document.fullscreenElement){
      playerContainer.requestFullscreen().catch(()=>{});
      fullscreenBtn.innerHTML = EXIT_FULLSCREEN_SVG;
    }else{
      document.exitFullscreen();
      fullscreenBtn.innerHTML = FULLSCREEN_SVG;
    }
  });

  // Double-tap seek (works in both portrait & landscape)
  let lastTap = 0;
  video.addEventListener('touchend',(e)=>{
    const now = Date.now();
    if(now - lastTap < 300){ // double tap detected
      const rect = video.getBoundingClientRect();
      const tapX = e.changedTouches[0].clientX - rect.left;
      if(tapX < rect.width/2){
        video.currentTime = Math.max(0, video.currentTime - 10);
        toast('⤆ 10s','ok');
      }else{
        video.currentTime = Math.min(video.duration||999, video.currentTime + 10);
        toast('10s ⤇','ok');
      }
    }
    lastTap = now;
  });

  // Progress bar
  progressBar.addEventListener('click',(e)=>{
    const rect=progressBar.getBoundingClientRect();
    const percent=(e.clientX-rect.left)/rect.width;
    video.currentTime=percent*video.duration;
  });

  // Speed
  speedControl.addEventListener('click',()=>{
    let speeds=[0.5,0.75,1,1.25,1.5,2];
    let idx=speeds.indexOf(video.playbackRate);
    let next=speeds[(idx+1)%speeds.length];
    video.playbackRate=next;
    speedControl.textContent=next+'x';
    toast(`Speed: ${next}x`,'ok');
  });

  // Auto hide controls
  let hideTimeout;
  function showControls(){playerContainer.classList.add('controls-visible');clearTimeout(hideTimeout);hideTimeout=setTimeout(()=>{playerContainer.classList.remove('controls-visible');},3000);}
  playerContainer.addEventListener('mousemove',showControls);
  playerContainer.addEventListener('touchstart',showControls);
  playerContainer.addEventListener('click',showControls);

  // Orientation handling (portrait / landscape)
  function handleOrientation(){
    const isLandscape = window.innerWidth > window.innerHeight;
    playerContainer.classList.toggle('landscape', isLandscape);
    video.style.objectFit = isLandscape ? 'cover' : 'contain';
  }
  window.addEventListener('resize',handleOrientation);
  window.addEventListener('orientationchange',handleOrientation);
  handleOrientation(); // initial call

  // Play / pause events
  video.addEventListener('play',()=>{playPauseBtn.innerHTML=PAUSE_SVG;startStudyTimer();});
  video.addEventListener('pause',()=>{playPauseBtn.innerHTML=PLAY_SVG;stopStudyTimer();});
  video.addEventListener('ended',()=>{playPauseBtn.innerHTML=PLAY_SVG;stopStudyTimer();});
}
