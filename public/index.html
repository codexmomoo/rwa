<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RWA - Rojgar With Ankit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #09090b;
  --surf: #18181b;
  --card: #27272a;
  --card2: #3f3f46;
  --bdr: #3f3f46;
  --acc: #6366f1;
  --acc2: #818cf8;
  --txt: #fafafa;
  --mut: #a1a1aa;
  --ok: #22c55e;
  --err: #ef4444;
}

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* Page System */
.page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  z-index: 1;
}
.page.active { display: flex !important; z-index: 10; }
.page.base { display: flex !important; z-index: 1; }

/* Top Bar */
.tb {
  background: var(--surf);
  border-bottom: 1px solid var(--bdr);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.tb-l { display: flex; align-items: center; gap: 14px; flex: 1; }
.bk {
  width: 40px;
  height: 40px;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.bk svg { width: 20px; height: 20px; stroke: var(--txt); fill: none; }
.tb-title { font-weight: 700; font-size: 18px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ava {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}

/* Scroll Area */
.sc {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: 85px;
}
.sc::-webkit-scrollbar { display: none; }

/* Bottom Nav */
.bnav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surf);
  border-top: 1px solid var(--bdr);
  display: flex;
  z-index: 20;
  padding-bottom: env(safe-area-inset-bottom);
}
.bnt {
  flex: 1;
  padding: 10px 4px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--mut);
  font-size: 10px;
  font-weight: 500;
  transition: color 0.2s;
}
.bnt.on { color: var(--acc); }
.bnt svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }

/* Login */
#pgLogin {
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.lb { width: 100%; max-width: 400px; }
.brand { text-align: center; margin-bottom: 32px; }
.blogo {
  width: 72px;
  height: 72px;
  margin: 0 auto 16px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 28px;
  color: #fff;
  box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
}
.brand h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.brand h1 span { color: var(--acc2); }
.brand p { color: var(--mut); font-size: 13px; margin-top: 6px; }
.lcard {
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: 24px;
  padding: 24px;
}
.tabs {
  display: flex;
  background: var(--card);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 4px;
}
.tabx {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--mut);
  font-size: 13px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 500;
}
.tabx.on { background: var(--acc); color: #fff; }
.ig { margin-bottom: 16px; }
.ig label {
  display: block;
  font-size: 11px;
  color: var(--mut);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
}
.ig input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--txt);
  font-size: 14px;
  outline: none;
}
.ig input:focus { border-color: var(--acc); }
.lbtn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  border: none;
  border-radius: 12px;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
.emsg {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 12px;
  padding: 12px;
  color: var(--err);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}
.emsg.on { display: block; }
#tsec { display: none; }

/* Cards */
.cc {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 12px;
  cursor: pointer;
  position: relative;
}
.cimg { width: 100%; height: 130px; object-fit: cover; background: var(--surf); }
.cph {
  width: 100%;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(129, 140, 248, 0.05));
}
.cbody { padding: 14px; display: flex; align-items: center; gap: 12px; }
.cico {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(99, 102, 241, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.cnm { font-weight: 600; font-size: 14px; line-height: 1.3; }
.cmeta { font-size: 11px; color: var(--mut); margin-top: 2px; }
.carrow { color: var(--mut); margin-left: auto; }
.fav-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.5);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  backdrop-filter: blur(4px);
}

/* Subject / Topic */
.rc {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
}
.rnum {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: rgba(99, 102, 241, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  color: var(--acc2);
}
.rimg { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
.rimgph {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(99, 102, 241, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.rtxt { flex: 1; }
.rnm { font-weight: 600; font-size: 14px; }
.rsub { font-size: 11px; color: var(--mut); margin-top: 2px; }
.rpro {
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 6px;
}

/* Videos */
.vc {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  display: flex;
  gap: 12px;
}
.vth { width: 88px; height: 58px; border-radius: 10px; object-fit: cover; }
.vthph {
  width: 88px;
  height: 58px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(129, 140, 248, 0.1));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.vtxt { flex: 1; }
.vnm { font-weight: 500; font-size: 13px; line-height: 1.4; }
.vdt { font-size: 11px; color: var(--mut); margin-top: 4px; }

/* Custom Player */
#pgPlayer { background: #000; }
#pgPlayer .tb { background: #000; border-color: #1a1a1a; }
.video-container {
  position: relative;
  background: #000;
}
#vplayer {
  width: 100%;
  display: block;
  max-height: 250px;
  background: #000;
}
.custom-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.video-container:hover .custom-controls,
.video-container.controls-visible .custom-controls {
  opacity: 1;
  pointer-events: auto;
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
  cursor: pointer;
}
.progress-fill {
  height: 100%;
  background: var(--acc);
  border-radius: 2px;
  width: 0%;
}
.control-buttons {
  display: flex;
  align-items: center;
  gap: 12px;
}
.control-buttons button {
  background: none;
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.time-display {
  margin-left: auto;
  font-size: 12px;
  font-family: monospace;
  color: #fff;
}
.speed-btn {
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
  color: #fff;
}
.player-info {
  padding: 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--bdr);
}
.player-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.player-date { font-size: 12px; color: var(--mut); margin-bottom: 12px; }
.player-actions { display: flex; gap: 10px; }
.pact-btn {
  padding: 10px 16px;
  border-radius: 10px;
  border: 1px solid var(--bdr);
  background: var(--card);
  color: var(--txt);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}
.pact-btn.primary {
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  border-color: transparent;
}
.pact-btn:disabled { opacity: 0.4; }

/* PDF Panel */
.pdf-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-top: 1px solid var(--bdr);
}
.pdf-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: var(--surf);
  border-bottom: 1px solid var(--bdr);
}
.pdf-header button {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--bdr);
  background: var(--card);
  color: var(--txt);
  font-size: 12px;
  cursor: pointer;
}
.pdf-tabs {
  display: flex;
  background: var(--surf);
  border-bottom: 1px solid var(--bdr);
}
.pdf-tab {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  color: var(--mut);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.pdf-tab.on {
  color: var(--acc);
  border-bottom-color: var(--acc);
}
.pdf-frame-wrap {
  flex: 1;
  overflow: hidden;
  background: #fff;
}
.pdf-frame-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Modals */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal-container {
  background: var(--surf);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 500px;
  border: 1px solid var(--bdr);
  border-bottom: none;
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--bdr);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-header { padding: 16px 20px; }
.modal-title { font-weight: 700; font-size: 16px; }
.modal-date { font-size: 12px; color: var(--mut); margin-top: 4px; }
.modal-body { padding: 0 20px 20px; }
.modal-sec {
  font-size: 11px;
  font-weight: 600;
  color: var(--mut);
  margin: 16px 0 10px;
}
.quality-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.quality-btn {
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--bdr);
  background: var(--card);
  color: var(--txt);
  font-size: 13px;
  cursor: pointer;
}
.pdf-buttons {
  display: flex;
  gap: 10px;
}
.pdf-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--bdr);
  background: var(--card);
  color: var(--txt);
  font-size: 13px;
  cursor: pointer;
}
.close-modal {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--bdr);
  background: var(--card);
  color: var(--mut);
  cursor: pointer;
}

/* Live pill */
.lpill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.25);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 14px;
  cursor: pointer;
}
.ldot {
  width: 8px;
  height: 8px;
  background: var(--org);
  border-radius: 50%;
  animation: pulse 1.4s infinite;
}
.ltxt { font-weight: 600; font-size: 13px; color: var(--org); }

/* Search */
.sw { display: flex; gap: 10px; margin-bottom: 16px; }
.si {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  padding: 12px;
  color: var(--txt);
  font-size: 14px;
  outline: none;
}
.si:focus { border-color: var(--acc); }
.sb {
  padding: 12px 18px;
  background: var(--acc);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}
.sh {
  font-size: 11px;
  font-weight: 600;
  color: var(--mut);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 16px 0 12px;
}

/* Empty states */
.empty { text-align: center; padding: 60px 20px; }
.empty .ei { font-size: 40px; margin-bottom: 16px; }
.empty h3 { font-size: 18px; margin-bottom: 8px; }
.empty p { color: var(--mut); font-size: 13px; }

/* Skeletons */
.skel {
  background: linear-gradient(90deg, var(--card) 25%, var(--bdr) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shim 1.4s infinite;
  border-radius: 14px;
}
.sk-c { height: 180px; margin-bottom: 12px; }
.sk-r { height: 70px; margin-bottom: 10px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 85px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 13px;
  z-index: 999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: rgba(34, 197, 94, 0.4); color: var(--ok); }
.toast.er { border-color: rgba(239, 68, 68, 0.4); color: var(--err); }

/* Load more */
#lmbtn {
  display: block;
  width: 90%;
  margin: 16px auto;
  padding: 12px;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  color: var(--acc2);
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}

/* Animations */
@keyframes shim {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="page" id="pgLogin">
<div class="lb">
  <div class="brand">
    <div class="blogo">RWA</div>
    <h1>Rojgar <span>With Ankit</span></h1>
    <p>Your learning companion</p>
  </div>
  <div class="lcard">
    <div class="tabs">
      <button class="tabx on" onclick="stab('email')">Email Login</button>
      <button class="tabx" onclick="stab('token')">Token Login</button>
    </div>
    <div id="esec">
      <div class="ig"><label>Email / Phone</label><input type="text" id="iem" placeholder="you@example.com"></div>
      <div class="ig"><label>Password</label><input type="password" id="ipass" placeholder="••••••••"></div>
    </div>
    <div id="tsec">
      <div class="ig"><label>Token</label><input type="text" id="itok" placeholder="eyJ...~@SDV_BOTX"></div>
    </div>
    <button class="lbtn" id="lbtn" onclick="doLogin()"><span id="lbi">Login →</span></button>
    <div class="emsg" id="emsg"></div>
  </div>
</div>
</div>

<!-- HOME PAGE -->
<div class="page base" id="pgHome">
  <div class="tb">
    <div class="tb-title">Rojgar With Ankit</div>
    <div class="ava" id="avabtn" onclick="gotoSheet()">S</div>
  </div>
  <div id="t0" class="sc">
    <div class="sw"><input class="si" id="sinp" placeholder="Search courses..."><button class="sb" onclick="srch()">Search</button></div>
    <div class="sh">All Courses</div>
    <div id="g0"></div>
    <button id="lmbtn" onclick="lmc()">Load More ↓</button>
  </div>
  <div id="t1" class="sc" style="display:none">
    <div class="sw"><input class="si" id="bsinp" placeholder="Search batches..."></div>
    <div class="sh">My Batches</div>
    <div id="g1"></div>
  </div>
  <div id="t2" class="sc" style="display:none">
    <div class="sh">Saved Courses</div>
    <div id="g2"></div>
  </div>
  <div id="t3" class="sc" style="display:none">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:18px;background:var(--card);border-radius:18px">
      <div id="pava" style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px">S</div>
      <div><div id="pname" style="font-weight:600;font-size:15px">Student</div><div id="pemail" style="font-size:12px;color:var(--mut)">—</div></div>
    </div>
    <button onclick="logout()" style="width:100%;padding:14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:14px;color:var(--err);font-weight:500;cursor:pointer">Logout</button>
  </div>
  <nav class="bnav">
    <button class="bnt on" id="bn0" onclick="swtab(0)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Courses</span></button>
    <button class="bnt" id="bn1" onclick="swtab(1)"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span>Batches</span></button>
    <button class="bnt" id="bn2" onclick="swtab(2)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><span>Saved</span></button>
    <button class="bnt" id="bn3" onclick="swtab(3)"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg><span>Profile</span></button>
  </nav>
</div>

<!-- SUBJECTS PAGE -->
<div class="page" id="pgSubj">
  <div class="tb">

<!-- SHEET -->
<div id="sheetOv" onclick="closeSheet(event)" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-end">
  <div style="width:100%;background:var(--surf);border-radius:24px 24px 0 0;padding:24px">
    <div style="width:40px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 20px"></div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--bdr)">
      <div id="sava" style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px">S</div>
      <div><div id="snm" style="font-weight:600">Student</div><div id="sem" style="font-size:12px;color:var(--mut)">—</div></div>
    </div>
    <button onclick="logout()" style="width:100%;padding:14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:14px;color:var(--err);font-weight:500;cursor:pointer">Logout</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------- API & STATE ----------
const TX = 'https://rozgarapinew.teachx.in/get';
const SDV = 'https://studyuk.site';
const API = {
  login: `${SDV}/rwa/login.php/credential-login?email=`,
  courses: `${TX}/courselist?start=`,
  batch: `${SDV}/rwaapi/my-batch.php`,
  subj: `${TX}/allsubjectfrmlivecourseclass?courseid=`,
  topic: `${TX}/alltopicfrmlivecourseclass?courseid=`,
  vlist: `${TX}/livecourseclassbycoursesubtopconceptapiv3?courseid=`,
  vdet: `${SDV}/rwaapi/index.php?endpoint=video-details&token=`,
  live: `${SDV}/rwaapi/index.php?endpoint=live&token=`,
};

const W = {
  tok: localStorage.getItem('tok') || null,
  user: JSON.parse(localStorage.getItem('usr') || 'null'),
  profileName: localStorage.getItem('profileName') || null,
  tab: 0,
  pg: 0,
  courses: [],
  hasMore: true,
  sq: '',
  batches: [],
  fbatches: [],
  course: null,
  subj: null,
  topic: null,
  androidId: localStorage.getItem('androidId') || 'dev_' + Math.random().toString(36).substr(2, 10),
  totalCoursesLoaded: 0
};

let currentHls = null;
let currentVideoData = null;
let playerVideo = null;
let playerControlsTimeout = null;

// ---------- HELPERS ----------
function getAuthToken() { return W.tok ? W.tok.replace('~@SDV_BOTX', '').trim() : ''; }
function th() { return { 'Client-Service': 'Appx', 'source': 'website', 'Auth-Key': 'appxapi', 'Authorization': getAuthToken() }; }
function proxyUrl(url) { return '/api/proxy?url=' + encodeURIComponent(url); }

async function apiCall(url, headers = {}) {
  try {
    let fetchUrl = url;
    if (url.includes('studyuk.site') || url.includes('classx.co.in')) { fetchUrl = proxyUrl(url); headers = {}; }
    const res = await fetch(fetchUrl, { headers: { ...headers } });
    const text = await res.text();
    try { return JSON.parse(text); } catch { return { error: 'Invalid JSON' }; }
  } catch (e) { return { error: e.message }; }
}

// ---------- PROFILE SETUP ----------
function showProfileSetup() {
  if (W.profileName || localStorage.getItem('profileName')) { updateProfileUI(); return; }
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  div.innerHTML = `<div style="background:var(--surf);border-radius:24px;padding:28px;width:100%;max-width:340px"><h2 style="margin-bottom:8px">Welcome!</h2><p style="color:var(--mut);margin-bottom:24px">Set your display name</p><input type="text" id="profileNameInput" placeholder="Your name" style="width:100%;padding:14px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;color:var(--txt);margin-bottom:20px"><button onclick="saveProfileName()" style="width:100%;padding:14px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:12px;color:#fff;font-weight:600">Continue</button></div>`;
  document.body.appendChild(div);
  document.getElementById('profileNameInput').focus();
}
function saveProfileName() {
  const name = document.getElementById('profileNameInput').value.trim();
  if (!name) return;
  localStorage.setItem('profileName', name);
  W.profileName = name;
  document.querySelector('[style*="position:fixed"][style*="z-index:200"]').remove();
  updateProfileUI();
}
function updateProfileUI() {
  const name = W.profileName || W.user?.name || 'Student';
  const initial = name.charAt(0).toUpperCase();
  ['pava', 'sava', 'avabtn'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = initial; });
  ['pname', 'snm'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = name; });
  document.getElementById('pemail').textContent = W.user?.email || '—';
  document.getElementById('sem').textContent = W.user?.email || '—';
}

// ---------- PAGE NAV ----------
function show(id) {
  ['pgLogin', 'pgHome', 'pgSubj', 'pgTopic', 'pgVid', 'pgPlayer', 'pgLive'].forEach(pid => {
    const el = document.getElementById(pid);
    if (el) { el.classList.remove('active'); el.style.display = 'none'; }
  });
  const target = document.getElementById(id);
  if (target) { target.style.display = 'flex'; target.classList.add('active'); }
}
function back(to) { show(to); if (to === 'pgHome') swtab(0); }
function closePlayer() {
  if (currentHls) { currentHls.destroy(); currentHls = null; }
  if (playerVideo) { playerVideo.pause(); playerVideo.src = ''; }
  document.getElementById('pdfPanel').style.display = 'none';
  back('pgVid');
}

// ---------- LOGIN ----------
function stab(m) {
  W.mode = m;
  document.querySelectorAll('.tabx').forEach((b, i) => b.classList.toggle('on', (i === 0 && m === 'email') || (i === 1 && m === 'token')));
  document.getElementById('esec').style.display = m === 'email' ? 'block' : 'none';
  document.getElementById('tsec').style.display = m === 'token' ? 'block' : 'none';
  document.getElementById('emsg').classList.remove('on');
}
async function doLogin() {
  const btn = document.getElementById('lbtn'), bi = document.getElementById('lbi');
  document.getElementById('emsg').classList.remove('on');
  bi.innerHTML = '<span class="spin" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite"></span>';
  btn.disabled = true;
  try {
    let tok = '', user = {};
    if ((W.mode || 'email') === 'token') {
      let raw = document.getElementById('itok').value.trim();
      if (!raw) throw new Error('Paste token');
      tok = raw.replace('~@SDV_BOTX', '').replace(/"/g, '').trim();
      try { user = JSON.parse(atob(tok.split('.')[1])); } catch (_) { }
    } else {
      const em = document.getElementById('iem').value.trim(), pw = document.getElementById('ipass').value;
      if (!em || !pw) throw new Error('Fill all fields');
      const res = await fetch(API.login + encodeURIComponent(em) + '&password=' + encodeURIComponent(pw));
      const data = await res.json();
      if (!data.token && !data.data?.token) throw new Error(data.message || 'Login failed');
      tok = (data.token || data.data?.token || '').replace(/"/g, '').trim();
      user = data.data || data;
    }
    if (!tok) throw new Error('No token');
    W.tok = tok + '~@SDV_BOTX';
    W.user = user;
    localStorage.setItem('tok', W.tok);
    localStorage.setItem('usr', JSON.stringify(user));
    toast('Login successful', 'ok');
    W.courses = []; W.batches = []; W.pg = 0;
    show('pgHome');
    swtab(0);
    if (!W.profileName && !localStorage.getItem('profileName')) showProfileSetup();
    else updateProfileUI();
    setTimeout(() => { loadCourses(true); loadBatches(); }, 100);
  } catch (e) {
    const em = document.getElementById('emsg');
    em.textContent = e.message;
    em.classList.add('on');
  } finally {
    bi.innerHTML = 'Login →';
    btn.disabled = false;
  }
}

// ---------- TABS ----------
function swtab(n) {
  W.tab = n;
  for (let i = 0; i < 4; i++) {
    const b = document.getElementById('bn' + i);
    if (b) b.classList.toggle('on', i === n);
    const c = document.getElementById('t' + i);
    if (c) c.style.display = i === n ? 'block' : 'none';
  }
  if (n === 0 && W.courses.length === 0) loadCourses(true);
  if (n === 1 && W.batches.length === 0) loadBatches();
  if (n === 2) loadFavs();
}

// ---------- COURSES ----------
async function loadCourses(reset) {
  if (reset) { W.pg = 0; W.courses = []; W.hasMore = true; W.totalCoursesLoaded = 0; }
  const g = document.getElementById('g0');
  if (reset) g.innerHTML = '<div class="skel sk-c"></div><div class="skel sk-c"></div><div class="skel sk-c"></div>';
  try {
    let url = API.courses + W.pg;
    if (W.sq) url += '&search=' + encodeURIComponent(W.sq);
    const r = await apiCall(url, th());
    const list = r.data || [];
    if (reset) { W.courses = list; W.totalCoursesLoaded = list.length; }
    else {
      const existingIds = new Set(W.courses.map(c => c.id));
      const newCourses = list.filter(c => !existingIds.has(c.id));
      W.courses = [...W.courses, ...newCourses];
      W.totalCoursesLoaded = W.courses.length;
    }
    if (list.length < 10 && W.pg > 0) W.hasMore = false;
    else if (list.length >= 10) W.hasMore = true;
    renderCourses();
    const lb = document.getElementById('lmbtn');
    if (lb) {
      if (!W.hasMore && W.pg > 0) { lb.innerHTML = 'All Loaded'; lb.disabled = true; }
      else { lb.innerHTML = `Load More ↓ (${W.totalCoursesLoaded})`; lb.disabled = false; }
    }
  } catch (e) { if (reset) g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3><p>Failed to load courses</p></div>'; }
}
function srch() { W.sq = document.getElementById('sinp').value.trim(); loadCourses(true); }
function lmc() { if (!W.hasMore && W.pg > 0) { toast('All loaded', 'ok'); return; } W.pg += 10; loadCourses(false); }

const COLORS = ['#6366f1', '#f59e0b', '#22c55e', '#ec4899', '#06b6d4', '#8b5cf6', '#ef4444', '#14b8a6'];
const ICONS = ['📘', '📙', '📗', '📕', '📓', '📔', '📒', '📚'];

function renderCourses() {
  const g = document.getElementById('g0');
  if (!W.courses.length) { g.innerHTML = '<div class="empty"><div class="ei">📋</div><h3>No Courses</h3></div>'; return; }
  const favs = JSON.parse(localStorage.getItem('favs') || '{}');
  g.innerHTML = W.courses.map((c, i) => {
    const nm = c.course_name || c.name || `Course ${i + 1}`;
    const id = c.id || i;
    const th = c.course_thumbnail || c.image || '';
    const col = COLORS[i % COLORS.length];
    const icon = ICONS[i % ICONS.length];
    const isFav = !!favs[id];
    return `<div class="cc" onclick="openSubj('${id}','${escapeHtml(nm)}')">
      ${th ? `<img class="cimg" src="${escapeHtml(th)}" loading="lazy" onerror="this.style.display='none'">` : `<div class="cph">${icon}</div>`}
      <button class="fav-btn" onclick="event.stopPropagation();toggleFav('${id}','${escapeHtml(nm)}','${escapeHtml(th)}',this)">${isFav ? '❤️' : '🤍'}</button>
      <div class="cbody"><div class="cico" style="background:${col}22;color:${col}">${icon}</div><div><div class="cnm">${escapeHtml(nm)}</div><div class="cmeta">Tap to view subjects</div></div><div class="carrow">›</div></div>
    </div>`;
  }).join('');
}
function toggleFav(id, name, img, btn) {
  const favs = JSON.parse(localStorage.getItem('favs') || '{}');
  if (favs[id]) { delete favs[id]; btn.textContent = '🤍'; toast('Removed', 'ok'); }
  else { favs[id] = { id, name, img }; btn.textContent = '❤️'; toast('Saved', 'ok'); }
  localStorage.setItem('favs', JSON.stringify(favs));
}
function loadFavs() {
  const favs = Object.values(JSON.parse(localStorage.getItem('favs') || '{}'));
  const g = document.getElementById('g2');
  if (!favs.length) { g.innerHTML = '<div class="empty"><div class="ei">❤️</div><h3>No Saved Courses</h3></div>'; return; }
  g.innerHTML = favs.map((c, i) => `<div class="cc" onclick="openSubj('${escapeHtml(c.id)}','${escapeHtml(c.name)}')">
    ${c.img ? `<img class="cimg" src="${escapeHtml(c.img)}" loading="lazy">` : `<div class="cph">${ICONS[i % ICONS.length]}</div>`}
    <div class="cbody"><div class="cnm">${escapeHtml(c.name)}</div><div class="carrow">›</div></div>
  </div>`).join('');
}

// ---------- BATCHES ----------
async function loadBatches() {
  const g = document.getElementById('g1');
  g.innerHTML = '<div class="skel sk-c"></div><div class="skel sk-c"></div>';
  try {
    const r = await apiCall(API.batch, { Authorization: `Bearer ${getAuthToken()}`, token: W.tok });
    const list = r.data || r || [];
    if (!list.length) { g.innerHTML = '<div class="empty"><div class="ei">📦</div><h3>No Batches</h3></div>'; return; }
    W.batches = list;
    W.fbatches = list;
    renderBatches(list);
  } catch (e) { g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3></div>'; }
}
function renderBatches(list) {
  const g = document.getElementById('g1');
  if (!list.length) { g.innerHTML = '<div class="empty"><div class="ei">📦</div><h3>No Batches</h3></div>'; return; }
  g.innerHTML = list.map((c, i) => {
    const nm = c.course_name || c.name || `Batch ${i + 1}`;
    const id = c.id || i;
    const th = c.course_thumbnail || c.image || '';
    const col = COLORS[i % COLORS.length];
    const icon = ICONS[i % ICONS.length];
    return `<div class="cc" onclick="openSubj('${id}','${escapeHtml(nm)}')">
      ${th ? `<img class="cimg" src="${escapeHtml(th)}" loading="lazy">` : `<div class="cph">${icon}</div>`}
      <div class="cbody"><div class="cico" style="background:${col}22;color:${col}">${icon}</div><div><div class="cnm">${escapeHtml(nm)}</div><div class="cmeta">Tap to view</div></div><div class="carrow">›</div></div>
    </div>`;
  }).join('');
}

// ---------- SUBJECTS, TOPICS, VIDEOS ----------
async function openSubj(cid, cnm) {
  W.course = { id: cid, name: cnm };
  document.getElementById('stitle').textContent = cnm;
  show('pgSubj');
  const g = document.getElementById('gs');
  g.innerHTML = '<div class="skel sk-r"></div><div class="skel sk-r"></div><div class="skel sk-r"></div>';
  try {
    const r = await apiCall(`${API.subj}${cid}&parent_id=-1`, th());
    const list = r.data || [];
    if (!list.length) { g.innerHTML = '<div class="empty"><div class="ei">📂</div><h3>No Subjects</h3></div>'; return; }
    g.innerHTML = list.map((s, i) => {
      const nm = s.subject_name || `Subject ${i + 1}`;
      const id = s.subjectid || s.id || i;
      const lg = s.subject_logo || s.logo || '';
      const icon = ICONS[i % ICONS.length];
      return `<div class="rc" onclick="openTopic('${id}','${escapeHtml(nm)}')">
        ${lg ? `<img class="rimg" src="${escapeHtml(lg)}" loading="lazy">` : `<div class="rimgph">${icon}</div>`}
        <div class="rtxt"><div class="rnm">${escapeHtml(nm)}</div><div class="rsub">Exclusive Access</div></div><div class="rpro">PRO</div>
      </div>`;
    }).join('');
  } catch (e) { g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3></div>'; }
}
async function openTopic(sid, snm) {
  W.subj = { id: sid, name: snm };
  document.getElementById('ttitle').textContent = snm;
  show('pgTopic');
  const g = document.getElementById('gt');
  g.innerHTML = '<div class="skel sk-r"></div><div class="skel sk-r"></div><div class="skel sk-r"></div>';
  try {
    const r = await apiCall(`${API.topic}${W.course.id}&subjectid=${sid}&start=-1`, th());
    const list = r.data || [];
    if (!list.length) { g.innerHTML = '<div class="empty"><div class="ei">📂</div><h3>No Topics</h3></div>'; return; }
    g.innerHTML = list.map((t, i) => {
      const nm = t.topic_name || `Topic ${i + 1}`;
      const id = t.topicid || t.id || i;
      return `<div class="rc" onclick="openVids('${id}','${escapeHtml(nm)}')">
        <div class="rnum">${String(i + 1).padStart(2, '0')}</div>
        <div class="rtxt"><div class="rnm">${escapeHtml(nm)}</div></div>
        <div class="carrow">›</div>
      </div>`;
    }).join('');
  } catch (e) { g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3></div>'; }
}
async function openVids(tid, tnm) {
  W.topic = { id: tid, name: tnm };
  document.getElementById('vtitle').textContent = tnm;
  show('pgVid');
  const g = document.getElementById('gv');
  g.innerHTML = '<div class="skel sk-r"></div><div class="skel sk-r"></div><div class="skel sk-r"></div>';
  try {
    const r = await apiCall(`${API.vlist}${W.course.id}&subjectid=${W.subj.id}&topicid=${tid}&conceptid=&start=-1`, th());
    const list = r.data || [];
    if (!list.length) { g.innerHTML = '<div class="empty"><div class="ei">🎬</div><h3>No Videos</h3></div>'; return; }
    g.innerHTML = list.map((v, i) => {
      const nm = v.Title || v.title || v.content_name || `Video ${i + 1}`;
      const id = v.id || v.content_id || i;
      const th2 = v.thumbnail || '';
      const cid = v.course_id || W.course.id;
      return `<div class="vc" onclick="loadVideoDetails('${id}','${escapeHtml(nm)}','${cid}')">
        ${th2 ? `<img class="vth" src="${escapeHtml(th2)}" loading="lazy">` : `<div class="vthph">▶️</div>`}
        <div class="vtxt"><div class="vnm">${escapeHtml(nm)}</div><div class="vdt">Tap to play</div></div>
      </div>`;
    }).join('');
  } catch (e) { g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3></div>'; }
}

// ---------- VIDEO DETAILS & PLAYER ----------
async function loadVideoDetails(vid, title, cid) {
  try {
    const url = `${API.vdet}${getAuthToken()}&userid=517077&course_id=${cid}&video_id=${vid}&id=${W.androidId}`;
    const r = await apiCall(url);
    const list = r.data || r || [];
    const v = Array.isArray(list) ? list[0] : list;
    if (!v) throw new Error();
    const qualities = v.qualities || {};
    const pdf1 = v.pdf_link || v.pdf1 || '';
    const pdf2 = v.pdf_link2 || v.pdf2 || '';
    const date = v.date_and_time || '';
    const videoTitle = v.title || title;
    currentVideoData = { vid, cid, qualities, pdf1, pdf2, videoTitle, date };
    showQualityModal(videoTitle, date, qualities, pdf1, pdf2);
  } catch (e) { toast('Failed to load video', 'er'); }
}
function showQualityModal(title, date, qualities, pdf1, pdf2) {
  const existing = document.getElementById('qualityModal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'qualityModal';
  modal.className = 'modal-overlay';
  const qualityList = ['720p', '480p', '360p', '240p', '144p'].filter(q => qualities[q]);
  modal.innerHTML = `<div class="modal-container">
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title">${escapeHtml(title)}</div><div class="modal-date">${date || 'Live Class'}</div></div>
    <div class="modal-body">
      <div class="modal-sec">Select Quality</div>
      <div class="quality-buttons" id="qBtns">${qualityList.map(q => `<button class="quality-btn" data-q="${q}">${q}</button>`).join('')}</div>
      <div class="modal-sec">Study Material</div>
      <div class="pdf-buttons"><button class="pdf-btn" id="mpdf1" ${!pdf1 ? 'disabled' : ''}>Notes PDF</button><button class="pdf-btn" id="mpdf2" ${!pdf2 ? 'disabled' : ''}>DPP PDF</button></div>
      <button class="close-modal" onclick="document.getElementById('qualityModal').remove()">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  qualityList.forEach(q => {
    modal.querySelector(`[data-q="${q}"]`).onclick = () => { modal.remove(); playVideoWithQuality(q); };
  });
  if (pdf1) document.getElementById('mpdf1').onclick = () => { modal.remove(); playVideoAndPdf(qualityList[0] || '480p', 1); };
  if (pdf2) document.getElementById('mpdf2').onclick = () => { modal.remove(); playVideoAndPdf(qualityList[0] || '480p', 2); };
}
function showQualityPicker() {
  if (!currentVideoData) return;
  const { qualities, pdf1, pdf2, videoTitle, date } = currentVideoData;
  showQualityModal(videoTitle, date, qualities, pdf1, pdf2);
}
function playVideoAndPdf(quality, pdfNum) { playVideoWithQuality(quality); setTimeout(() => openPdf(pdfNum), 1000); }

function initPlayer() {
  const video = document.getElementById('vplayer');
  playerVideo = video;
  const playPauseBtn = document.getElementById('playPauseBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const timeDisplay = document.getElementById('timeDisplay');
  const speedBtn = document.getElementById('speedBtn');
  const container = document.getElementById('videoContainer');

  function formatTime(secs) {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    return h > 0 ? `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : `${m}:${s.toString().padStart(2, '0')}`;
  }
  function updateProgress() {
    if (video.duration) {
      const percent = (video.currentTime / video.duration) * 100;
      progressFill.style.width = `${percent}%`;
      timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    }
  }
  video.addEventListener('timeupdate', updateProgress);
  video.addEventListener('loadedmetadata', updateProgress);
  playPauseBtn.addEventListener('click', () => {
    if (video.paused) { video.play(); playPauseBtn.textContent = '⏸'; }
    else { video.pause(); playPauseBtn.textContent = '▶'; }
  });
  progressBar.addEventListener('click', (e) => {
    const rect = progressBar.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    video.currentTime = percent * video.duration;
  });
  const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
  speedBtn.addEventListener('click', () => {
    let idx = speeds.indexOf(video.playbackRate);
    let next = speeds[(idx + 1) % speeds.length];
    video.playbackRate = next;
    speedBtn.textContent = next + 'x';
    toast(`Speed: ${next}x`, 'ok');
  });
  video.addEventListener('play', () => { playPauseBtn.textContent = '⏸'; });
  video.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });
  function showControls() {
    container.classList.add('controls-visible');
    clearTimeout(playerControlsTimeout);
    playerControlsTimeout = setTimeout(() => container.classList.remove('controls-visible'), 2000);
  }
  container.addEventListener('mousemove', showControls);
  container.addEventListener('touchstart', showControls);
  video.addEventListener('click', () => {
    if (video.paused) video.play();
    else video.pause();
    showControls();
  });
}

function playVideoWithQuality(quality) {
  if (!currentVideoData) return;
  let url = currentVideoData.qualities[quality];
  if (!url) { toast('Quality not available', 'er'); return; }
  show('pgPlayer');
  document.getElementById('ptbar').textContent = currentVideoData.videoTitle;
  document.getElementById('ptitle').textContent = currentVideoData.videoTitle;
  document.getElementById('pdate').textContent = currentVideoData.date || '';
  document.getElementById('pdfBtn1').disabled = !currentVideoData.pdf1;
  document.getElementById('pdfBtn2').disabled = !currentVideoData.pdf2;
  document.getElementById('pdfPanel').style.display = 'none';
  const video = document.getElementById('vplayer');
  if (currentHls) { currentHls.destroy(); currentHls = null; }
  video.pause(); video.src = ''; video.load();
  if (url.includes('.m3u8') && window.Hls && window.Hls.isSupported()) {
    const hls = new window.Hls({ enableWorker: true });
    currentHls = hls;
    hls.loadSource(proxyUrl(url));
    hls.attachMedia(video);
    hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
      setTimeout(() => video.play().catch(() => {}), 300);
    });
  } else {
    video.src = proxyUrl(url);
    video.play().catch(() => {});
  }
  setTimeout(() => initPlayer(), 100);
}

function openPdf(num) {
  if (!currentVideoData) return;
  const url = num === 1 ? currentVideoData.pdf1 : currentVideoData.pdf2;
  if (!url) { toast('PDF not available', 'er'); return; }
  document.getElementById('pdfPanel').style.display = 'flex';
  document.getElementById('pdfTab1').style.display = currentVideoData.pdf1 ? 'block' : 'none';
  document.getElementById('pdfTab2').style.display = currentVideoData.pdf2 ? 'block' : 'none';
  switchPdf(num);
}
function switchPdf(num) {
  const url = num === 1 ? currentVideoData?.pdf1 : currentVideoData?.pdf2;
  document.getElementById('pdfTab1').classList.toggle('on', num === 1);
  document.getElementById('pdfTab2').classList.toggle('on', num === 2);
  if (url) document.getElementById('pdfFrame').src = `https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(url)}`;
}
function closePdfPanel() { document.getElementById('pdfPanel').style.display = 'none'; document.getElementById('pdfFrame').src = ''; }

// ---------- LIVE ----------
async function goLive() {
  show('pgLive');
  const g = document.getElementById('gl');
  g.innerHTML = '<div class="skel sk-r"></div><div class="skel sk-r"></div>';
  try {
    const r = await apiCall(`${API.live}${getAuthToken()}&userid=517077&course_id=${W.course?.id || '1'}`);
    const list = r.data || [];
    if (!list.length) { g.innerHTML = '<div class="empty"><div class="ei">📺</div><h3>No Live Classes</h3></div>'; return; }
    g.innerHTML = list.map(v => {
      const su = v.primary_stream_url || v.qualities?.high || '';
      return `<div class="cc" onclick="${su ? `playLive('${escapeHtml(su)}','${escapeHtml(v.title || '')}')` : ''}" style="${!su ? 'opacity:0.6' : ''}">
        <div class="cbody"><div><div class="cnm">${escapeHtml(v.title || 'Live Class')}</div><div class="cmeta">${v.live_status === 'live' ? 'LIVE' : 'Scheduled'}</div></div>${su ? '<div class="carrow">›</div>' : ''}</div>
      </div>`;
    }).join('');
  } catch (e) { g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3></div>'; }
}
function playLive(url, title) {
  show('pgPlayer');
  document.getElementById('ptbar').textContent = title;
  document.getElementById('ptitle').textContent = title;
  document.getElementById('pdate').textContent = 'Live';
  document.getElementById('pdfPanel').style.display = 'none';
  const video = document.getElementById('vplayer');
  if (currentHls) { currentHls.destroy(); currentHls = null; }
  video.pause(); video.src = '';
  if (url.includes('.m3u8') && window.Hls && window.Hls.isSupported()) {
    const hls = new window.Hls();
    currentHls = hls;
    hls.loadSource(proxyUrl(url));
    hls.attachMedia(video);
    hls.on(window.Hls.Events.MANIFEST_PARSED, () => { setTimeout(() => video.play().catch(() => {}), 300); });
  } else {
    video.src = proxyUrl(url);
    video.play().catch(() => {});
  }
  setTimeout(() => initPlayer(), 100);
}

function closeSheet(e) { if (e.target === document.getElementById('sheetOv')) document.getElementById('sheetOv').style.display = 'none'; }
function logout() {
  localStorage.removeItem('tok');
  localStorage.removeItem('usr');
  W.tok = null;
  W.user = null;
  W.courses = [];
  W.batches = [];
  document.getElementById('sheetOv').style.display = 'none';
  show('pgLogin');
  toast('Logged out', 'ok');
}
function toast(msg, t = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${t}`;
  setTimeout(() => el.classList.remove('show'), 3000);
}
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
