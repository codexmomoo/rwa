<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0c14;--surf:#13131f;--card:#1c1c2e;--bdr:#2a2a42;--acc:#7c6df0;--acc2:#a78bfa;--org:#ff6b35;--txt:#eeeef5;--mut:#6b6b8a;--ok:#4ade80;--err:#f87171;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow:hidden}
.page{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:1;}
.page.active{display:flex !important;z-index:10}
.page.base{display:flex !important;z-index:1}
.tb{background:var(--surf);border-bottom:1px solid var(--bdr);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-l{display:flex;align-items:center;gap:10px}
.bk{width:34px;height:34px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.tb-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ava{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:80px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdr);display:flex;z-index:20;}
.bnt{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--mut);font-size:10px;font-family:'DM Sans',sans-serif;transition:color .2s;}
.bnt.on{color:var(--acc)}
.bnt svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
#pgLogin{z-index:50;justify-content:center;align-items:center;padding:20px;background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(124,109,240,.18) 0%,transparent 60%),var(--bg)}
.lb{width:100%;max-width:400px}
.brand{text-align:center;margin-bottom:24px}
.blogo{width:64px;height:64px;margin:0 auto 12px;border-radius:18px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff;box-shadow:0 8px 30px rgba(124,109,240,.4);}

.lcard{background:var(--surf);border:1px solid var(--bdr);border-radius:18px;padding:24px}
.tabs{display:flex;background:var(--card);border-radius:11px;padding:4px;margin-bottom:20px}
.tabx{flex:1;padding:9px;border:none;background:transparent;color:var(--mut);font-size:14px;border-radius:9px;cursor:pointer;transition:all .2s}
.tabx.on{background:var(--acc);color:#fff}
.ig{margin-bottom:12px}
.ig label{display:block;font-size:11px;color:var(--mut);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.ig input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:12px 14px;color:var(--txt);font-size:15px;outline:none;transition:border-color .2s;font-family:inherit;}
.ig input:focus{border-color:var(--acc)}
.lbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 4px 18px rgba(124,109,240,.35);}

.emsg{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:10px 14px;color:var(--err);font-size:13px;margin-top:10px;display:none}
.emsg.on{display:block}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:border-color .2s;}
.cc:active{border-color:var(--acc)}
.cimg{width:100%;height:110px;object-fit:cover;display:block;background:var(--surf)}
.cph{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,rgba(124,109,240,.2),rgba(167,139,250,.1))}

.cmeta{font-size:11px;color:var(--mut);margin-top:2px}

.pdfb:disabled{opacity:.4;cursor:not-allowed}
.lpill{display:flex;align-items:center;gap:8px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);border-radius:11px;padding:11px 14px;margin-bottom:12px;cursor:pointer;}
.ldot{width:8px;height:8px;background:var(--org);border-radius:50%;animation:pulse 1.4s infinite;flex-shrink:0}
.ltxt{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--org)}
.sw{display:flex;gap:8px;margin-bottom:13px}
.si{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:10px 13px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;}

.sb{background:var(--acc);border:none;border-radius:11px;padding:10px 14px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.sh{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 9px}
.empty{text-align:center;padding:50px 20px}

.skel{background:linear-gradient(90deg,var(--card) 25%,var(--bdr) 50%,var(--card) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:12px}
.sk-c{height:160px;margin-bottom:12px;border-radius:14px}
.sk-r{height:66px;margin-bottom:10px;border-radius:13px}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:9px 16px;font-size:13px;z-index:999;transition:transform .3s;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.4);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.3);color:var(--ok)}
.toast.er{border-color:rgba(248,113,113,.3);color:var(--err)}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:inline-block}
.bi{display:flex;align-items:center;justify-content:center;gap:8px}
#lmbtn{display:block;width:90%;margin:15px auto;padding:12px;background:var(--card);border:1px solid var(--bdr);border-radius:11px;color:var(--acc2);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#tsec{display:none}
.log-panel{position:fixed;bottom:70px;right:10px;background:#000000cc;color:#4ade80;font-size:10px;padding:5px 10px;border-radius:8px;z-index:100;max-width:200px;overflow:hidden;font-family:monospace;cursor:pointer}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}

.modal-header{padding:20px;border-bottom:1px solid var(--bdr);}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.modal-date{font-size:12px;color:var(--mut);margin-top:5px;}
.modal-body{padding:20px;}
.modal-section-title{font-size:14px;margin-bottom:12px;color:var(--mut);}
.quality-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.quality-btn{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 16px;color:var(--txt);font-size:14px;cursor:pointer;transition:all .2s;}
.quality-btn:hover,.quality-btn.active{background:var(--acc);border-color:var(--acc);color:#fff;}
.pdf-buttons{display:flex;gap:10px;margin-top:10px;}
.pdf-btn{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px;color:var(--txt);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.pdf-btn:disabled{opacity:0.4;cursor:not-allowed;}
.close-modal{width:100%;margin-top:15px;padding:12px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;color:var(--mut);font-size:13px;cursor:pointer;}
</style>
</head>

<script>
// ========== LOGGER ==========
let errorLogs = [];
function log(msg, type = 'info') {
  const timestamp = new Date().toLocaleTimeString();
  const logMsg = `[${timestamp}] ${type.toUpperCase()}: ${msg}`;
  errorLogs.push(logMsg);
  console.log(logMsg);
  const logPanel = document.getElementById('logPanel');
  if (logPanel) {
    let count = errorLogs.filter(l => l.includes('ERROR')).length;
    logPanel.innerHTML = `📋 ${count > 0 ? count + ' Errors' : 'Logs'}`;
    logPanel.style.background = count > 0 ? '#f87171cc' : '#000000cc';
  }
}
function copyLogs() {
  navigator.clipboard.writeText(errorLogs.join('\n'));
  toast('📋 Logs copied!', 'ok');
}

// ========== APIs ==========
const TX = 'https://rozgarapinew.teachx.in/get';
const SDV = 'https://studyuk.site';

const API = {
  login: `${SDV}/rwa/login.php/credential-login?email=`,
  tokenL: `${SDV}/rwa/login.php/token-login?token=`,
  courses: `${TX}/courselist?start=`,
  batch: `${SDV}/rwaapi/my-batch.php`,
  subj: `${TX}/allsubjectfrmlivecourseclass?courseid=`,
  topic: `${TX}/alltopicfrmlivecourseclass?courseid=`,
  vlist: `${TX}/livecourseclassbycoursesubtopconceptapiv3?courseid=`,
  vdet: `${SDV}/rwaapi/index.php?endpoint=video-details&token=`,
  live: `${SDV}/rwaapi/index.php?endpoint=live&token=`,
  dm: `${SDV}/rwaapi/1dm.php?url=`,
};

// ========== STATE ==========
const W = {
  tok: localStorage.getItem('tok') || null,
  user: JSON.parse(localStorage.getItem('usr') || 'null'),
  tab: 0,
  pg: 0, courses: [], hasMore: true, sq: '',

// ========== HELPERS ==========
function getAuthToken() {
  return W.tok ? W.tok.replace('~@SDV_BOTX', '').trim() : '';
}

function th() {
  return {
    'Client-Service': 'Appx',
    'source': 'website',
    'Auth-Key': 'appxapi',
    'Authorization': getAuthToken(),
  };
}

async function apiCall(url, headers = {}) {
  try {
    log(`API Call: ${url.substring(0, 80)}...`);
    const res = await fetch(url, { headers: { ...headers } });
    const text = await res.text();
    try { 
      const json = JSON.parse(text);
      log(`API Success: ${url.substring(0, 50)}...`);
      return json;
    }
    catch { 
      log(`API Invalid JSON`, 'error');
      return { error: 'Invalid JSON', raw: text.substring(0, 200) }; 
    }
  } catch(e) { 
    log(`API Error: ${e.message}`, 'error');
    return { error: e.message }; 
  }
}

function show(id) {
  const allPages = ['pgLogin', 'pgHome', 'pgSubj', 'pgTopic', 'pgVid', 'pgPlayer', 'pgLive'];
  allPages.forEach(pageId => {
    const el = document.getElementById(pageId);
    if (el) {

  const target = document.getElementById(id);
  if (target) {
    target.style.display = 'flex';
    target.classList.add('active');
    if (id === 'pgHome') target.classList.add('base');
  }

function stab(m) {
  W.mode = m;
  document.querySelectorAll('.tabx').forEach((b, i) => {
    b.classList.toggle('on', (i === 0 && m === 'email') || (i === 1 && m === 'token'));
  });
  document.getElementById('esec').style.display = m === 'email' ? 'block' : 'none';
  document.getElementById('tsec').style.display = m === 'token' ? 'block' : 'none';

async function doLogin() {
  const btn = document.getElementById('lbtn');
  const bi = document.getElementById('lbi');
  document.getElementById('emsg').classList.remove('on');
  bi.innerHTML = '<span class="spin"></span> Logging in...';
  btn.disabled = true;
  
  try {
    let tok = '', user = {};
    
    if ((W.mode || 'email') === 'token') {
      let raw = document.getElementById('itok').value.trim();
      if (!raw) throw new Error('Paste your token');
      tok = raw.replace('~@SDV_BOTX', '').replace(/"/g, '').trim();
      try { user = JSON.parse(atob(tok.split('.')[1])); } catch(_) {}
    } else {
      const em = document.getElementById('iem').value.trim();
      const pw = document.getElementById('ipass').value;
      if (!em || !pw) throw new Error('Fill all fields');
      
      const url = API.login + encodeURIComponent(em) + '&password=' + encodeURIComponent(pw);
      const res = await fetch(url);
      const data = await res.json();
      
      if (!data.token && !data.data?.token) throw new Error(data.message || 'Login failed');
      tok = (data.token || data.data?.token || '').replace(/"/g, '').trim();
      user = data.data || data;
    }
    
    if (!tok) throw new Error('No token received');
    
    W.tok = tok + '~@SDV_BOTX';
    W.user = user;
    localStorage.setItem('tok', W.tok);
    localStorage.setItem('usr', JSON.stringify(user));
    
    toast('Login successful 🎉', 'ok');
    log('Login successful');
    
    W.courses = [];
    W.batches = [];
    W.pg = 0;
    
    show('pgHome');
    swtab(0);
    
    setTimeout(() => {
      loadCourses(true);
      loadBatches();
    }, 100);
    
  } catch(e) {
    log(`Login Error: ${e.message}`, 'error');
    const em = document.getElementById('emsg');
    em.textContent = e.message;
    em.classList.add('on');
  } finally {
    bi.innerHTML = 'Login →';
    btn.disabled = false;
  }
}

async function loadCourses(reset) {
  if (reset) { W.pg = 0; W.courses = []; W.hasMore = true; W.totalCoursesLoaded = 0; }
  const g = document.getElementById('g0');
  if (reset) g.innerHTML = '<div class="skel sk-c"></div><div class="skel sk-c"></div><div class="skel sk-c"></div>';
  try {
    let url = API.courses + W.pg;
    if (W.sq) url += '&search=' + encodeURIComponent(W.sq);
    const r = await apiCall(url, th());
    const list = r.data || [];
    
    if (reset) {
      W.courses = list;
      W.totalCoursesLoaded = list.length;
    } else {
      const existingIds = new Set(W.courses.map(c => c.id));
      const newCourses = list.filter(c => !existingIds.has(c.id));
      W.courses = [...W.courses, ...newCourses];
      W.totalCoursesLoaded = W.courses.length;
    }
    
    if (list.length < 10 && W.pg > 0) W.hasMore = false;
    else if (list.length >= 10) W.hasMore = true;
    
    renderCourses();
    
    const lmbtn = document.getElementById('lmbtn');
    if (lmbtn) {
      if (W.sq) lmbtn.style.display = 'none';
      else {
        lmbtn.style.display = 'block';
        if (!W.hasMore && W.pg > 0) {
          lmbtn.innerHTML = '✅ All Courses Loaded';
          lmbtn.disabled = true;
          lmbtn.style.opacity = '0.6';
        } else {
          lmbtn.innerHTML = `Load More ↓ (${W.totalCoursesLoaded} loaded)`;
          lmbtn.disabled = false;
          lmbtn.style.opacity = '1';
        }
      }
    }
  } catch(e) {
    if (reset) g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3><p>' + e.message + '</p></div>';
  }
}

// ========== VIDEO QUALITY DIALOG ==========
async function showQualityDialogForVideo(vid, title, cid) {
  try {
    const tokenClean = getAuthToken();
    const url = `${API.vdet}${tokenClean}&userid=517077&course_id=${cid}&video_id=${vid}&id=${W.androidId}`;
    log(`Loading video details...`);
    const r = await apiCall(url);
    const list = r.data || r || [];
    const v = Array.isArray(list) ? list[0] : list;
    if (!v) throw new Error('No video data');
    
    const qualities = v.qualities || {};
    const pdf1 = v.pdf_link || v.pdf1 || '';
    const pdf2 = v.pdf_link2 || v.pdf2 || '';
    const date = v.date_and_time || '';
    const videoTitle = v.title || title;
    
    currentVideoData = { vid, cid, qualities, pdf1, pdf2, videoTitle, date };
    
    const existingModal = document.getElementById('qualityModal');
    if (existingModal) existingModal.remove();
    
    const modal = document.createElement('div');
    modal.id = 'qualityModal';
    modal.className = 'modal-overlay';
    
    const qualityList = ['720p', '480p', '360p', '240p', '144p'].filter(q => qualities[q]);
    
    modal.innerHTML = `
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-title">${esc(videoTitle)}</div>
          <div class="modal-date">${date || 'Live Class'}</div>
        </div>
        <div class="modal-body">
          <div class="modal-section-title">Select Quality:</div>
          <div class="quality-buttons" id="qualityButtons">
            ${qualityList.map(q => `<button class="quality-btn" data-quality="${q}">${q}</button>`).join('')}
          </div>
          <div class="modal-section-title">Study Material:</div>
          <div class="pdf-buttons">
            <button class="pdf-btn" id="pdf1Btn" ${!pdf1 ? 'disabled' : ''}>📄 Notes PDF</button>
            <button class="pdf-btn" id="pdf2Btn" ${!pdf2 ? 'disabled' : ''}>📋 DPP PDF</button>
          </div>
          <button class="close-modal" id="closeModalBtn">Cancel</button>
        </div>
      </div>
    `;
    
    document.body.appendChild(modal);
    
    qualityList.forEach(q => {
      const btn = modal.querySelector(`.quality-btn[data-quality="${q}"]`);
      if (btn) btn.onclick = () => { playVideoWithQuality(q); modal.remove(); };
    });
    
    const pdf1Btn = document.getElementById('pdf1Btn');
    const pdf2Btn = document.getElementById('pdf2Btn');
    if (pdf1Btn) pdf1Btn.onclick = () => { window.open(pdf1, '_blank'); modal.remove(); };
    if (pdf2Btn) pdf2Btn.onclick = () => { window.open(pdf2, '_blank'); modal.remove(); };
    
    const closeBtn = document.getElementById('closeModalBtn');
    if (closeBtn) closeBtn.onclick = () => modal.remove();
    
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    
  } catch(e) {
    log(`Video Load Error: ${e.message}`, 'error');
    toast('Failed to load video details', 'er');
  }
}

// ========== PROXY HELPER ==========
function proxyUrl(url) {
  // Agar same origin pe hain toh proxy use karo
  // Vercel pe deploy hone ke baad yeh /api/proxy use karega
  return '/api/proxy?url=' + encodeURIComponent(url);
}

// ========== PLAY VIDEO (PROXY ENABLED) ==========
function playVideoWithQuality(quality) {
  if (!currentVideoData) return;
  
  let url = currentVideoData.qualities[quality];
  if (!url) {
    log(`No URL for quality: ${quality}`, 'error');
    toast('Video URL not available', 'er');
    return;
  }
  
  // Clean URL - query params remove karo
  if (url.includes('?')) {
    url = url.split('?')[0];
    log(`Cleaned URL: ${url.substring(0, 80)}...`);
  }
  
  log(`Playing quality: ${quality}, URL: ${url.substring(0, 80)}...`);
  
  show('pgPlayer');
  document.getElementById('ptbar').textContent = currentVideoData.videoTitle;
  document.getElementById('ptitle').textContent = currentVideoData.videoTitle;
  document.getElementById('pdate').textContent = currentVideoData.date || '';
  
  const video = document.getElementById('vplayer');
  
  if (currentHls) {
    currentHls.destroy();
    currentHls = null;
  }
  
  video.pause();
  video.src = '';
  video.load();

  // Proxy ke through HLS load karo - CORS fix
  if (url.includes('.m3u8') && window.Hls && window.Hls.isSupported()) {
    const proxied = proxyUrl(url);
    log(`Using proxy: ${proxied.substring(0, 80)}...`);

    const hls = new window.Hls({
      enableWorker: true,
      lowLatencyMode: false,
      maxBufferLength: 30,
    });

    currentHls = hls;
    hls.loadSource(proxied);
    hls.attachMedia(video);

    hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
      log('Manifest parsed, playing...');
      video.play().catch(e => log(`Play error: ${e.message}`, 'error'));
    });

    hls.on(window.Hls.Events.ERROR, (event, data) => {
      log(`HLS Error: ${data.type} - ${data.details}`, 'error');
      if (data.fatal) {
        if (data.type === window.Hls.ErrorTypes.NETWORK_ERROR) {
          log('Network error - retrying...', 'error');
          hls.startLoad();
        } else if (data.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
          log('Media error - recovering...', 'error');
          hls.recoverMediaError();
        } else {
          hls.destroy();
          toast('Video load failed. Try another quality.', 'er');
        }
      }
    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // iOS Safari - native HLS support, proxy use karo
    video.src = proxyUrl(url);
    video.play().catch(e => log(`Native HLS error: ${e.message}`, 'error'));
  } else {
    video.src = proxyUrl(url);
    video.play().catch(e => log(`Direct play error: ${e.message}`, 'error'));
  }
}

async function goLive() {
  show('pgLive');
  const g = document.getElementById('gl');
  g.innerHTML = '<div class="skel sk-r"></div><div class="skel sk-r"></div><div class="skel sk-r"></div>';
  try {
    const r = await apiCall(`${API.live}${getAuthToken()}&userid=517077&course_id=${W.course?.id || '1'}`);
    const list = r.data || [];
    if (!list.length) { g.innerHTML = '<div class="empty"><div class="ei">📺</div><h3>No Live</h3><p>No live classes now.</p></div>'; return; }
    g.innerHTML = list.map(v => {
      const live = v.live_status === 'live' || v.live_status === '1';
      const su = v.primary_stream_url || v.qualities?.high || v.qualities?.medium || '';
      let cleanUrl = su;
      if (cleanUrl && cleanUrl.includes('?')) cleanUrl = cleanUrl.split('?')[0];
      return `<div class="cc" onclick="${cleanUrl ? `playLive('${esc(cleanUrl)}','${esc(v.title || '')}')` : ''}" style="${!cleanUrl ? 'opacity:.6' : ''}">${v.thumbnail ? `<img class="cimg" src="${esc(v.thumbnail)}" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="cbody"><div style="flex:1;min-width:0"><div class="cnm">${esc(v.title || 'Live Class')}</div><div class="cmeta" style="color:${live ? 'var(--org)' : 'var(--mut)'}">${live ? '🔴 LIVE' : '⏰ ' + esc(v.date_and_time || 'Scheduled')}</div></div>${cleanUrl ? '<div class="carrow">▶</div>' : ''}</div></div>`;
    }).join('');
  } catch(e) { g.innerHTML = '<div class="empty"><div class="ei">⚠️</div><h3>Error</h3><p>' + e.message + '</p></div>'; }
}

function playLive(url, title) {
  log(`Playing live: ${title}`);
  show('pgPlayer');
  document.getElementById('ptbar').textContent = title;
  document.getElementById('ptitle').textContent = title;
  document.getElementById('pdate').textContent = '🔴 Live';
  
  const video = document.getElementById('vplayer');
  
  if (currentHls) {
    currentHls.destroy();
    currentHls = null;
  }
  
  video.pause();
  video.src = '';
  
  if (url.includes('.m3u8') && window.Hls && window.Hls.isSupported()) {
    const proxied = proxyUrl(url);
    const hls = new window.Hls({ enableWorker: true });
    currentHls = hls;
    hls.loadSource(proxied);
    hls.attachMedia(video);
    hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(e => log(`Live play error: ${e.message}`, 'error'));
    });
    hls.on(window.Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        log(`Live HLS Error: ${data.details}`, 'error');
        hls.destroy();
        toast('Live stream error', 'er');
      }
    });
  } else {
    video.src = proxyUrl(url);
    video.play().catch(e => log(`Live play error: ${e.message}`, 'error'));
  }
}

function gotoSheet() {
  document.getElementById('sheetOv').style.display = 'flex';
}
function closeSheet(e) {
  if (e.target === document.getElementById('sheetOv')) document.getElementById('sheetOv').style.display = 'none';
}

function logout() {
  localStorage.removeItem('tok');
  localStorage.removeItem('usr');
  W.tok = null;
  W.user = null;
  W.courses = [];
  W.batches = [];
  document.getElementById('sheetOv').style.display = 'none';
  document.getElementById('sinp').value = '';
  show('pgLogin');
  toast('Logged out', 'ok');
}

function toast(msg, t = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${t}`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ========== INIT ==========
window.onload = () => {
  log('App started');
  if (W.tok) {
    show('pgHome');
    swtab(0);
    loadCourses(true);
    loadBatches();
    loadProf();
  } else {
    show('pgLogin');
  }
};
</script>
